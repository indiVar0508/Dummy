name: "Test"

on:
  push:
    branches:
      - master
    paths-ignore:
      - "docs/**"
  pull_request:
    paths-ignore:
      - "docs/**"
  schedule:
    - cron: '40 1 * * 3'


jobs:
  setup_services:
    runs-on: ubuntu-latest
    steps:
      - id: set-py-matrix
        run: echo 'python-version=["3.6", "3.10"]' >> $GITHUB_OUTPUT
      - id: set-db-engine
        run: echo '::set-output name=db-engine::["sqlite", "mysql", "postgres"]'
      - run: echo "${{ steps.set-py-matrix.outputs.python-version }}"
    outputs:
      python-version: ${{ steps.set-py-matrix.outputs.python-version }}
      db-engine: ${{ steps.set-db-engine.outputs.db-engine }}
    # services:
    #   mysql:
    #     image: mysql
    #     ports:
    #       - 3306:3306
    #     env:
    #       MYSQL_DATABASE: sqlalchemy_history_test
    #       MYSQL_ALLOW_EMPTY_PASSWORD: yes
    #     options: >-
    #       --health-cmd "mysqladmin ping"
    #       --health-interval 5s
    #       --health-timeout 2s
    #       --health-retries 3
    #   postgres:
    #     image: postgres
    #     ports:
    #       - 5432:5432
    #     env:
    #       POSTGRES_PASSWORD: postgres
    #       POSTGRES_DB: sqlalchemy_history_test
    #     options: >-
    #       --health-cmd pg_isready
    #       --health-interval 5s
    #       --health-timeout 2s
    #       --health-retries 3

  Test:
    needs: 
      - setup_services
    strategy:
      matrix:
        python-version: ${{ fromJson(needs.setup_services.outputs.python-version) }}
        db-engine: ${{ fromJson(needs.setup_services.outputs.db-engine) }}
    name: test-${{ matrix.python-version }}:${{ matrix.db-engine }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v1
      - name: Setup Python
        uses: actions/setup-python@v2
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade poetry 
          poetry install
      - name: Run tests
        run:
          source "$( poetry env list --full-path | grep Activated | cut -d' ' -f1 )/bin/activate" 
          pytest
        env:
          DB: ${{ matrix.db-engine }}